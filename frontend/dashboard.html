<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamTask — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-body">

  <!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#6366f1"/>
        <path d="M10 18l5 5 11-11" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>TeamTask</span>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section-label">Main</p>

      <a href="#" class="nav-item active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>

      <a href="#" class="nav-item" data-page="projects">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </a>

      <a href="#" class="nav-item" data-page="tasks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>
        My Tasks
      </a>

    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sb-avatar">U</div>
        <div class="sidebar-user-info">
          <span class="sidebar-username" id="sb-username">User</span>
          <span class="sidebar-role" id="sb-role">member</span>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
  <div class="main-wrap">

    <!-- TOP NAVBAR -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="topbar-breadcrumb">
        <span id="page-title">Dashboard</span>
      </div>

      <div class="topbar-right">
        <div class="topbar-user">
          <div class="avatar avatar-sm" id="top-avatar">U</div>
          <div class="topbar-user-info">
            <span id="top-username">User</span>
            <span id="top-role" class="role-badge">member</span>
          </div>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="content">

      <!-- ─── DASHBOARD PAGE ─── -->
      <section id="page-dashboard" class="page active">
        <div class="page-header">
          <div>
            <h1 class="page-heading">Dashboard</h1>
            <p class="page-sub" id="dash-greeting">Good morning</p>
          </div>
        </div>

        <!-- Stat cards -->
        <div class="stat-grid" id="stat-grid">
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
          <div class="stat-card skeleton"></div>
        </div>

        <!-- Recent tasks table -->
        <div class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Recent Tasks</h2>
            <a href="#" class="link-sm" data-page="tasks">View all →</a>
          </div>
          <div class="panel-body" id="recent-tasks-body">
            <div class="spinner-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </section>

      <!-- ─── PROJECTS PAGE ─── -->
      <section id="page-projects" class="page">
        <div class="page-header">
          <div>
            <h1 class="page-heading">Projects</h1>
            <p class="page-sub">Manage your team projects</p>
          </div>
          <button class="btn-primary" id="new-project-btn" style="display:none" onclick="openModal('modal-project')">
            + New Project
          </button>
        </div>
        <div class="project-grid" id="project-grid">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </section>

      <!-- ─── TASKS PAGE ─── -->
      <section id="page-tasks" class="page">
        <div class="page-header">
          <div>
            <h1 class="page-heading">My Tasks</h1>
            <p class="page-sub">All tasks assigned to you</p>
          </div>
          <button class="btn-primary" id="new-task-btn" onclick="openModal('modal-task')">
            + New Task
          </button>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
          <select id="filter-project" class="filter-select">
            <option value="">All Projects</option>
          </select>
          <select id="filter-status" class="filter-select">
            <option value="">All Status</option>
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <select id="filter-priority" class="filter-select">
            <option value="">All Priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>

        <!-- Task table -->
        <div class="panel">
          <div class="table-wrap" id="tasks-table-wrap">
            <div class="spinner-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- ═══════════════════════════ MODALS ═══════════════════════════ -->

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="modal-project">
    <div class="modal">
      <div class="modal-header">
        <h3>New Project</h3>
        <button class="modal-close" onclick="closeModal('modal-project')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-project">
        <div class="modal-body">
          <div class="field">
            <label for="proj-name">Project Name <span class="req">*</span></label>
            <input id="proj-name" type="text" placeholder="e.g. Website Redesign" required />
          </div>
          <div class="field">
            <label for="proj-desc">Description</label>
            <textarea id="proj-desc" rows="3" placeholder="What is this project about?"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" onclick="closeModal('modal-project')">Cancel</button>
          <button type="submit" class="btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create Task Modal -->
  <div class="modal-overlay" id="modal-task">
    <div class="modal">
      <div class="modal-header">
        <h3>New Task</h3>
        <button class="modal-close" onclick="closeModal('modal-task')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-task">
        <div class="modal-body">
          <div class="field">
            <label for="task-project">Project <span class="req">*</span></label>
            <select id="task-project" required></select>
          </div>
          <div class="field">
            <label for="task-title">Title <span class="req">*</span></label>
            <input id="task-title" type="text" placeholder="Task title" required />
          </div>
          <div class="field">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" rows="2" placeholder="Optional details"></textarea>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="task-status">Status</label>
              <select id="task-status">
                <option value="todo">Todo</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div class="field">
              <label for="task-priority">Priority</label>
              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="task-deadline">Deadline</label>
              <input id="task-deadline" type="date" />
            </div>
            <div class="field">
              <label for="task-assign">Assign To</label>
              <select id="task-assign">
                <option value="">Unassigned</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" onclick="closeModal('modal-task')">Cancel</button>
          <button type="submit" class="btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
