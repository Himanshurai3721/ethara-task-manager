<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamTask — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-split">

    <!-- Left branding panel -->
    <div class="auth-brand">
      <div class="auth-brand-inner">
        <div class="brand-logo">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="#6366f1"/>
            <path d="M10 18l5 5 11-11" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>TeamTask</span>
        </div>
        <h1 class="auth-brand-headline">Collaborate.<br/>Ship faster.</h1>
        <p class="auth-brand-sub">One place for your team's projects, tasks, and deadlines.</p>
        <ul class="auth-feature-list">
          <li>
            <span class="feature-dot"></span>
            Role-based access control
          </li>
          <li>
            <span class="feature-dot"></span>
            Real-time task tracking
          </li>
          <li>
            <span class="feature-dot"></span>
            Deadline & overdue alerts
          </li>
        </ul>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-card">

        <div class="auth-card-header">
          <h2 id="auth-title">Welcome back</h2>
          <p id="auth-subtitle" class="auth-card-sub">Sign in to your account</p>
        </div>

        <!-- Tab switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
        </div>

        <!-- Alert -->
        <div id="auth-alert" class="auth-alert" style="display:none"></div>

        <!-- LOGIN FORM -->
        <form id="login-form" autocomplete="on">
          <div class="field">
            <label for="login-username">Username</label>
            <input id="login-username" type="text" placeholder="your_username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <div class="input-wrap">
              <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-full" id="login-btn">
            <span>Sign In</span>
          </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" style="display:none" autocomplete="on">
          <div class="field">
            <label for="reg-username">Username</label>
            <input id="reg-username" type="text" placeholder="your_username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="reg-email">Email</label>
            <input id="reg-email" type="email" placeholder="you@company.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="reg-role">Account type</label>
            <select id="reg-role">
              <option value="member">Member</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="field">
            <label for="reg-password">Password</label>
            <div class="input-wrap">
              <input id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
              <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-full" id="register-btn">
            <span>Create Account</span>
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
